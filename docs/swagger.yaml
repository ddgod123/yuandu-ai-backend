info:
  contact: {}
  description: Backend API for Emoji collection site
  title: Emoji API
  version: 0.1.0
paths:
  /api/admin/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.CategoryResponse'
            type: array
      summary: List categories
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: category request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CategoryResponse'
      summary: Create category
      tags:
      - admin
  /api/admin/categories/{id}:
    delete:
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: integer
      - description: empty|trash
        in: query
        name: mode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.DeleteCategoryResponse'
      summary: Delete category (empty or move to trash)
      tags:
      - admin
    put:
      consumes:
      - application/json
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: integer
      - description: category request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CategoryResponse'
      summary: Update category
      tags:
      - admin
  /api/admin/categories/{id}/objects:
    get:
      parameters:
      - description: category id
        in: path
        name: id
        required: true
        type: integer
      - description: keyword
        in: query
        name: keyword
        type: string
      - description: type (image|gif|video|other)
        in: query
        name: type
        type: string
      - description: sort (put_time|size|key)
        in: query
        name: sort
        type: string
      - description: order (asc|desc)
        in: query
        name: order
        type: string
      - description: marker
        in: query
        name: marker
        type: string
      - default: 50
        description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ListCategoryObjectsResponse'
      summary: List objects under category
      tags:
      - admin
  /api/admin/collections/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: collection id
        in: path
        name: id
        required: true
        type: integer
      - description: collection update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.AdminUpdateCollectionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.CollectionListItem'
      summary: Update collection (admin)
      tags:
      - admin
  /api/admin/collections/{id}/emojis/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: collection id
        in: path
        name: id
        required: true
        type: integer
      - description: emoji files
        in: formData
        name: files
        required: true
        type: file
      - description: set first file as cover
        in: formData
        name: set_cover
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.EmojiUploadResponse'
      summary: Upload emojis to existing collection
      tags:
      - admin
  /api/admin/collections/{id}/import-zip:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: collection id
        in: path
        name: id
        required: true
        type: integer
      - description: zip file
        in: formData
        name: file
        required: true
        type: file
      - description: set first file as cover
        in: formData
        name: set_cover
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AppendZipResponse'
      summary: Append zip to existing collection
      tags:
      - admin
  /api/admin/collections/import-zip:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: collection title
        in: formData
        name: title
        required: true
        type: string
      - description: collection description
        in: formData
        name: description
        type: string
      - description: category id
        in: formData
        name: category_id
        required: true
        type: integer
      - description: comma-separated tag ids
        in: formData
        name: tag_ids
        type: string
      - description: zip file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.ImportZipResponse'
      summary: Import collection zip
      tags:
      - admin
  /api/admin/storage/batch-delete:
    post:
      consumes:
      - application/json
      parameters:
      - description: batch delete request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.BatchDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BatchDeleteResponse'
      summary: Batch delete or trash objects
      tags:
      - admin
  /api/admin/storage/object:
    delete:
      parameters:
      - description: object key
        in: query
        name: key
        required: true
        type: string
      - default: trash
        description: delete|trash
        in: query
        name: mode
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.MessageResponse'
      summary: Delete or trash an object
      tags:
      - admin
  /api/admin/storage/search:
    get:
      parameters:
      - default: emoji/
        description: prefix
        in: query
        name: prefix
        type: string
      - description: keyword
        in: query
        name: keyword
        type: string
      - description: type (image|gif|video|other)
        in: query
        name: type
        type: string
      - description: sort (put_time|size|key)
        in: query
        name: sort
        type: string
      - description: order (asc|desc)
        in: query
        name: order
        type: string
      - description: marker
        in: query
        name: marker
        type: string
      - default: 50
        description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SearchObjectsResponse'
      summary: Search objects in storage
      tags:
      - admin
  /api/admin/storage/trash:
    delete:
      parameters:
      - default: emoji/_trash/
        description: prefix
        in: query
        name: prefix
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TrashEmptyResponse'
      summary: Empty trash prefix
      tags:
      - admin
    get:
      parameters:
      - default: emoji/_trash/
        description: prefix
        in: query
        name: prefix
        type: string
      - description: marker
        in: query
        name: marker
        type: string
      - default: 50
        description: limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TrashListResponse'
      summary: List trash objects
      tags:
      - admin
  /api/admin/storage/trash/batch-restore:
    post:
      consumes:
      - application/json
      parameters:
      - description: batch restore request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.BatchRestoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.BatchRestoreResponse'
      summary: Batch restore trash objects
      tags:
      - admin
  /api/admin/storage/trash/restore:
    post:
      consumes:
      - application/json
      parameters:
      - description: restore request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.TrashRestoreRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TrashRestoreResponse'
      summary: Restore trash object
      tags:
      - admin
  /api/admin/tag-groups:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.TagGroupResponse'
            type: array
      summary: List tag groups
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: tag group request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.TagGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.TagGroupResponse'
